name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# 同一ブランチで連続実行されたら古い run を打ち切る（無駄なCI時間を省く）
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # 型チェック → lint(biome) → テスト → 循環依存 → デッドコード → 型カバレッジ → 重複コード
      - run: npm run check:all
      # 本番ビルドが通ることまで確認（デプロイ前の最終ゲート）
      - run: npm run build
      # バンドルサイズ予算（build 後の dist を計測。超過で失敗）
      - run: npm run size
      # Lighthouse 監査（dist を preview で配信。a11y/best-practices は閾値割れで失敗）
      - run: npm run lighthouse
      # e2e a11y（axe）。モーダルを開いた状態など、Lighthouse の単一ロードでは届かない検査
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
